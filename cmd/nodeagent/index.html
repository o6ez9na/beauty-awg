<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>6ers3rk node</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2330;--border:#2a3140;--text:#e6edf3;--muted:#8b949e;--accent:#2f81f7;--ok:#3fb950;--danger:#f85149}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px}
  .wrap{max-width:820px;margin:0 auto;padding:32px 16px 64px}
  h1{font-size:18px;font-weight:700;letter-spacing:.5px}
  h1 span{color:var(--accent)}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:18px}
  .card h2{margin:0 0 12px;font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:11px 12px;font-size:15px}
  input:focus{outline:none;border-color:var(--accent)}
  textarea{width:100%;min-height:320px;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;line-height:1.5;resize:vertical}
  button{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:11px 18px;cursor:pointer;font-weight:600;font-size:15px}
  button.ghost{background:transparent;border:1px solid var(--border);color:var(--text);font-size:14px;padding:9px 14px}
  button:disabled{opacity:.5;cursor:default}
  .row{display:flex;gap:10px;margin-top:12px;align-items:center;flex-wrap:wrap}
  pre{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;overflow:auto;font-size:12px;white-space:pre-wrap;margin:0}
  .muted{color:var(--muted)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .msg{font-size:13px}
  .msg.ok{color:var(--ok)}.msg.err{color:var(--danger)}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
  .badge.pending{background:rgba(47,129,247,.15);color:var(--accent)}
  .badge.active{background:rgba(63,185,80,.15);color:var(--ok)}
  .badge.rejected{background:rgba(248,81,73,.15);color:var(--danger)}
  .hide{display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1><img src="/logo.svg" alt="" style="height:26px;vertical-align:-6px;margin-right:9px" />6ers3<span>rk</span> · node <span id="nodeVersion" class="muted mono" style="font-size:12px;font-weight:400"></span></h1>

  <!-- UPDATE (shown whenever the panel reports a newer release) -->
  <div id="updateBanner" class="card hide" style="border-color:var(--accent)">
    <div class="row" style="justify-content:space-between;margin-top:0">
      <div>Update available: <span id="updLatest" class="mono"></span> <span class="muted">(current: <span id="updCurrent" class="mono"></span>)</span></div>
      <div class="row" style="margin-top:0">
        <button id="updateBtn">Update &amp; restart</button>
        <span id="updateMsg" class="msg"></span>
      </div>
    </div>
  </div>

  <!-- CONNECT (shown when not yet active) -->
  <div id="connect" class="card hide">
    <h2>Connect to a panel</h2>
    <p class="muted" style="margin-top:0">Enter the panel's IP address, then wait for the administrator to approve.</p>
    <input id="panel" type="text" placeholder="150.241.89.70" autofocus />
    <div class="muted mono" id="lan" style="margin-top:8px"></div>
    <div class="row">
      <button id="connectBtn">Connect</button>
      <span id="connectMsg" class="msg"></span>
    </div>
  </div>

  <!-- WAITING (pending/rejected) -->
  <div id="waiting" class="card hide">
    <h2>Enrollment</h2>
    <div>Status: <span id="statusBadge" class="badge"></span></div>
    <p class="muted" id="waitText"></p>
  </div>

  <!-- EDITOR (shown when active) -->
  <div id="editor" class="card hide">
    <h2>awg config</h2>
    <textarea id="conf" spellcheck="false"></textarea>
    <div class="row">
      <button id="save">Save &amp; apply</button>
      <button class="ghost" id="reload">Reload</button>
      <span id="editMsg" class="msg"></span>
    </div>
  </div>
  <div id="statusCard" class="card hide">
    <h2>status (awg show)</h2>
    <pre id="awgstatus">…</pre>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const show = (id, on) => $(id).classList.toggle("hide", !on);

async function api(path, opts) {
  const r = await fetch(path, { credentials: "same-origin", ...opts });
  return r;
}

let editorLoaded = false;

async function refresh() {
  let s;
  try {
    s = await (await api("/api/state")).json();
  } catch { return; }

  if (s.version) $("nodeVersion").textContent = s.version;

  show("updateBanner", !!s.update_available);
  if (s.update_available) {
    $("updLatest").textContent = s.latest_version;
    $("updCurrent").textContent = s.version || "?";
  }

  const active = s.status === "active";
  show("connect", !s.enrolled || s.status === "rejected" ? false : false); // decided below

  if (!s.enrolled) {
    show("connect", true); show("waiting", false); show("editor", false); show("statusCard", false);
    $("lan").textContent = s.subnet ? `will expose LAN ${s.subnet} (via ${s.iface})` : "";
    return;
  }

  if (!active) {
    show("connect", s.status === "rejected");
    show("waiting", true); show("editor", false); show("statusCard", false);
    const b = $("statusBadge"); b.textContent = s.status || "…"; b.className = "badge " + (s.status||"");
    $("waitText").textContent =
      s.status === "pending" ? "Waiting for the administrator to approve this node in the panel." :
      s.status === "rejected" ? "This request was rejected. You can re-enter the panel IP to try again." :
      "Contacting panel…";
    if (s.status === "rejected") $("lan").textContent = s.subnet ? `will expose LAN ${s.subnet} (via ${s.iface})` : "";
    return;
  }

  // active
  show("connect", false); show("waiting", false); show("editor", true); show("statusCard", true);
  if (!editorLoaded) { loadConfig(); editorLoaded = true; }
  loadStatus();
}

async function loadConfig() {
  const r = await api("/api/config");
  if (r.ok) $("conf").value = await r.text();
}
async function loadStatus() {
  const r = await api("/api/status");
  if (r.ok) $("awgstatus").textContent = await r.text();
}

$("connectBtn").onclick = async () => {
  const panel = $("panel").value.trim();
  if (!panel) return;
  $("connectBtn").disabled = true;
  $("connectMsg").className = "msg";
  $("connectMsg").textContent = "requesting…";
  const r = await api("/api/connect", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ panel }),
  });
  if (r.ok) { $("connectMsg").textContent = ""; refresh(); }
  else { $("connectMsg").className = "msg err"; $("connectMsg").textContent = await r.text(); }
  $("connectBtn").disabled = false;
};

$("save").onclick = async () => {
  $("save").disabled = true; $("editMsg").className = "msg"; $("editMsg").textContent = "applying…";
  const r = await api("/api/config", { method: "POST", headers: { "Content-Type": "text/plain" }, body: $("conf").value });
  $("awgstatus").textContent = await r.text();
  $("editMsg").className = "msg " + (r.ok ? "ok" : "err");
  $("editMsg").textContent = r.ok ? "applied" : "error";
  $("save").disabled = false;
};
$("reload").onclick = loadConfig;

$("updateBtn").onclick = async () => {
  const latest = $("updLatest").textContent;
  if (!confirm(`Update node agent to ${latest} and restart now? The tunnel will drop for a few seconds.`)) return;
  $("updateBtn").disabled = true;
  $("updateMsg").className = "msg";
  $("updateMsg").textContent = "updating…";
  const r = await api("/api/update", { method: "POST" });
  if (r.ok) {
    $("updateMsg").className = "msg ok";
    $("updateMsg").textContent = "restarting…";
  } else {
    $("updateMsg").className = "msg err";
    $("updateMsg").textContent = await r.text();
    $("updateBtn").disabled = false;
  }
};

refresh();
setInterval(refresh, 4000);
</script>
</body>
</html>
