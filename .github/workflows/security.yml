name: Security

# ---------------------------------------------------------------------------
# Free / OSS-only security pipeline for this JS-TS (web/) + Go (root) monorepo.
# Three layers per language:
#   SCA (deps)  : OSV-Scanner (both) + npm audit (JS) + govulncheck (Go)
#   SAST (code) : Semgrep OSS (both) + gosec / go vet (Go)
#   Secrets     : Gitleaks (whole repo, language-agnostic)
#
# Severity policy:
#   BLOCKING       -> high/critical dep CVEs, reachable Go vulns, leaked secrets
#   INFORMATIONAL  -> SAST findings, go vet (reported via SARIF / logs, never fail)
# Each job is tagged [BLOCKING] or [INFO] in its name. The final `security-gate`
# job aggregates the blocking results into a single required status that
# release.yml gates on (this workflow is also callable via workflow_call).
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main] # main only — feature branches are covered by their PR run
    tags: ["**"] # every tag (release gating)
  pull_request: # every PR (feature-branch commits land here, not in push)
  workflow_call: # lets release.yml run this as a prerequisite gate

permissions:
  contents: read
  security-events: write # required to upload SARIF to the Security tab

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs only; never cancel a release-gating run.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GOVULNCHECK_VERSION: v1.1.4 # pinned so the go-install cache key is stable
  OSV_SCANNER_VERSION: v2.4.0 # pinned so the go-install cache key is stable

jobs:
  # -------------------------------------------------------------------------
  # detect: figure out which stacks exist so Go/JS jobs stay conditional even
  # if the repo layout changes. Exposes booleans + the JS directory.
  # -------------------------------------------------------------------------
  detect:
    name: Detect stacks
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
      js: ${{ steps.check.outputs.js }}
      js_dir: ${{ steps.check.outputs.js_dir }}
    steps:
      - uses: actions/checkout@v7
      - id: check
        run: |
          if [ -f go.mod ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi
          # First package.json outside node_modules decides the JS project dir.
          pkg="$(find . -name node_modules -prune -o -name package.json -print | head -n1)"
          if [ -n "$pkg" ]; then
            echo "js=true" >> "$GITHUB_OUTPUT"
            echo "js_dir=$(dirname "$pkg")" >> "$GITHUB_OUTPUT"
          else
            echo "js=false" >> "$GITHUB_OUTPUT"
          fi

  # =========================================================================
  # SCA (dependencies)
  # =========================================================================

  # OSV-Scanner covers BOTH package-lock.json and go.mod in one recursive pass.
  # We install the pinned binary directly (instead of the action) so we can emit
  # THREE views of the same scan from one install:
  #   - Markdown -> the run's Step Summary (human-readable, zero setup)
  #   - JSON     -> the severity gate + downloadable artifact
  #   - SARIF    -> the GitHub Security tab
  # [BLOCKING] but only on high/critical (CVSS >= 7.0) — the gate step decides,
  # since osv-scanner itself exits non-zero on ANY severity.
  osv-scanner:
    name: OSV-Scanner (JS+Go SCA) [BLOCKING high/critical]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Cache osv-scanner binary
        id: cache-osv
        uses: actions/cache@v4
        with:
          path: ~/go/bin/osv-scanner
          key: osv-scanner-${{ runner.os }}-${{ env.OSV_SCANNER_VERSION }}
      - name: Install osv-scanner
        if: steps.cache-osv.outputs.cache-hit != 'true'
        run: go install github.com/google/osv-scanner/v2/cmd/osv-scanner@${{ env.OSV_SCANNER_VERSION }}

      # One scan, two output files (the combined report job renders them). `|| true`
      # because a non-zero exit (vulns found) is expected — the gate step decides.
      - name: Scan (JSON + SARIF)
        run: |
          osv-scanner scan --recursive --format json  --output osv-results.json  ./ || true
          osv-scanner scan --recursive --format sarif --output osv-results.sarif ./ || true

      - name: Upload OSV SARIF to Security tab
        if: always() && hashFiles('osv-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

      - name: Upload OSV reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osv-scanner-reports
          path: |
            osv-results.json
            osv-results.sarif
          if-no-files-found: ignore

      - name: Gate on high/critical only
        run: |
          if [ ! -f osv-results.json ]; then
            echo "No OSV output produced; treating as clean."; exit 0
          fi
          high=$(jq '[.results[]?.packages[]?.groups[]?.max_severity
                      | select(. != null and . != "")
                      | tonumber | select(. >= 7.0)] | length' osv-results.json)
          echo "High/critical vulnerable dependency groups: ${high}"
          if [ "${high}" -gt 0 ]; then
            echo "::error::OSV-Scanner found ${high} high/critical dependency vuln(s). See the job summary."
            exit 1
          fi
          echo "Only low/medium (or unscored) findings — informational, not blocking."

  # npm audit natively honours a severity threshold. [BLOCKING] on high+.
  npm-audit:
    name: npm audit (JS SCA) [BLOCKING high]
    needs: detect
    if: needs.detect.outputs.js == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ needs.detect.outputs.js_dir }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm # caches the npm download cache
          cache-dependency-path: ${{ needs.detect.outputs.js_dir }}/package-lock.json
      # Raw JSON for the combined report job (never fails on its own).
      - name: npm audit (JSON)
        if: always()
        run: npm audit --json > npm-audit.json 2>/dev/null || true
      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: ${{ needs.detect.outputs.js_dir }}/npm-audit.json
          if-no-files-found: ignore
      # Reads package-lock.json directly; no install needed. [BLOCKING] on high+.
      - name: npm audit gate (high+)
        run: npm audit --audit-level=high

  # govulncheck adds reachability analysis on top of OSV data. A reported vuln
  # is one that is actually reachable from your code, so treat it as [BLOCKING].
  govulncheck:
    name: govulncheck (Go SCA, reachability) [BLOCKING]
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true # caches Go module + build cache (keyed on go.sum)
      - name: Cache govulncheck binary
        id: cache-govulncheck
        uses: actions/cache@v4
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ runner.os }}-${{ env.GOVULNCHECK_VERSION }}
      - name: Install govulncheck
        if: steps.cache-govulncheck.outputs.cache-hit != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

      # Text run = the blocking signal (exit 3 on findings) + human-readable
      # report (call traces + fix versions). SARIF run = structured data for the
      # combined report. Both continue-on-error; the gate re-checks the exit code.
      - name: Run govulncheck (text)
        id: gvc
        continue-on-error: true
        run: |
          set +e
          govulncheck ./... > govulncheck.txt 2>&1
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          cat govulncheck.txt
          exit 0
      - name: Run govulncheck (SARIF)
        continue-on-error: true
        run: govulncheck -format sarif ./... > govulncheck.sarif 2>/dev/null || true
      - name: Upload govulncheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report
          path: |
            govulncheck.txt
            govulncheck.sarif
          if-no-files-found: ignore
      - name: Gate
        run: |
          if [ "${{ steps.gvc.outputs.exit }}" != "0" ]; then
            echo "::error::govulncheck found reachable vulnerabilities. See the report."
            exit 1
          fi
          echo "No reachable vulnerabilities."

  # =========================================================================
  # SAST (your own code) — INFORMATIONAL: reported, never fails the build.
  # =========================================================================

  # Semgrep OSS with free registry rulesets (no token; that's the paid cloud).
  semgrep:
    name: Semgrep OSS (JS+Go SAST) [INFO]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Semgrep OSS
        run: pip install --quiet semgrep
      - name: Semgrep scan (SARIF)
        continue-on-error: true # SAST findings are informational
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/javascript \
            --config p/golang \
            --sarif --output semgrep.sarif
      - name: Upload Semgrep SARIF to Security tab
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: Upload Semgrep report
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep.sarif
          if-no-files-found: ignore

  # gosec + go vet for Go source. INFORMATIONAL (-no-fail / continue-on-error).
  gosec:
    name: gosec + go vet (Go SAST) [INFO]
    needs: detect
    if: needs.detect.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run gosec (SARIF)
        uses: securego/gosec@master
        with:
          # -no-fail keeps it informational; SARIF goes to the Security tab.
          args: -no-fail -fmt sarif -out gosec.sarif ./...
      - name: Upload gosec SARIF to Security tab
        if: always() && hashFiles('gosec.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec
      - name: Upload gosec report
        if: always() && hashFiles('gosec.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: gosec.sarif
          if-no-files-found: ignore
      - name: go vet
        continue-on-error: true # informational
        run: go vet ./...

  # =========================================================================
  # Secrets — Gitleaks over the whole repo + history. [BLOCKING] on any leak.
  # =========================================================================
  gitleaks:
    name: Gitleaks (secrets) [BLOCKING]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so past commits are scanned too
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: gitleaks-action is free for personal repos. Only GitHub *org*
          # accounts need a free GITLEAKS_LICENSE key (see instructions).

  # =========================================================================
  # Combined report — merges every scanner's raw output into ONE view:
  #   * a rich Markdown report rendered in the run's Summary tab (GitHub UI)
  #   * a single styled, self-contained HTML file as the `security-report` artifact
  # Runs even if scanners failed (always()), so findings are always visible.
  # =========================================================================
  security-report:
    name: Security report (combined)
    if: always()
    needs: [osv-scanner, npm-audit, govulncheck, semgrep, gosec, gitleaks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7 # for .github/scripts/security_report.py
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download all scanner artifacts
        uses: actions/download-artifact@v4
        with:
          path: sec-artifacts # each artifact lands in its own subfolder
      - name: Render combined report (Markdown UI + HTML artifact)
        run: |
          python3 .github/scripts/security_report.py \
            --artifacts sec-artifacts \
            --out security-report.html \
            --summary "$GITHUB_STEP_SUMMARY" \
            --status "osv-scanner=${{ needs.osv-scanner.result }},govulncheck=${{ needs.govulncheck.result }},npm-audit=${{ needs.npm-audit.result }},semgrep=${{ needs.semgrep.result }},gosec=${{ needs.gosec.result }},gitleaks=${{ needs.gitleaks.result }}" \
            --repo "${{ github.repository }}" \
            --sha "${{ github.sha }}" \
            --ref "${{ github.ref_name }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Upload combined report (single artifact)
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.html
          if-no-files-found: warn

  # =========================================================================
  # Gate — single required status. Fails if ANY blocking job failed.
  # Informational jobs (semgrep, gosec) are intentionally excluded.
  # release.yml uses this as its prerequisite via `needs`.
  # =========================================================================
  security-gate:
    name: Security gate [BLOCKING]
    if: always()
    needs: [osv-scanner, npm-audit, govulncheck, gitleaks]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate blocking checks
        run: |
          # Skipped (a stack not present) is OK; failure/cancelled is not.
          for r in \
            "osv-scanner=${{ needs.osv-scanner.result }}" \
            "npm-audit=${{ needs.npm-audit.result }}" \
            "govulncheck=${{ needs.govulncheck.result }}" \
            "gitleaks=${{ needs.gitleaks.result }}"; do
            name="${r%%=*}"; res="${r#*=}"
            echo "${name}: ${res}"
            if [ "${res}" = "failure" ] || [ "${res}" = "cancelled" ]; then
              echo "::error::Blocking security check '${name}' did not pass."
              failed=1
            fi
          done
          if [ "${failed:-0}" = "1" ]; then exit 1; fi
          echo "All blocking security checks passed."
